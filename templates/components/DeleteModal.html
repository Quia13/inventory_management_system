<div id="deleteModal"
     class="fixed inset-0 z-50 hidden items-center justify-center"
     style="background: rgba(0,0,0,0.8);">

    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-md shadow-lg">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-white">
            {{ title|default:"Confirm Deletion" }}
        </h2>

        <p id="deleteMessage" class="mt-2 text-sm text-gray-600 dark:text-gray-300">
            {{ message|default:"Are you sure you want to delete this item?" }}
        </p>

        <form id="deleteForm" method="POST" class="hidden">
            {% csrf_token %}
        </form>

        <div class="mt-4 flex justify-end gap-2">
            <button type="button"
                    id="cancelDelete"
                    class="px-4 py-2 bg-gray-300 dark:bg-gray-700 text-gray-800 dark:text-white rounded hover:bg-gray-400">
                Cancel
            </button>

            <button type="button"
                    id="confirmDelete"
                    class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                Yes, Delete it.
            </button>
        </div>
    </div>
</div>

<script>
    const deleteModal = document.getElementById('deleteModal');
    const deleteForm = document.getElementById('deleteForm');
    const deleteMessage = document.getElementById('deleteMessage');

    function openDeleteModal(actionUrl, message='Are you sure?') {
        deleteForm.action = actionUrl;
        deleteMessage.textContent = message;

        deleteModal.classList.remove('hidden');
        deleteModal.classList.add('flex');
    }

    function closeDeleteModal() {
        deleteModal.classList.add('hidden');
        deleteModal.classList.remove('flex');
    }

    document.getElementById('cancelDelete')
        .addEventListener('click', closeDeleteModal);

    document.getElementById('confirmDelete')
        .addEventListener('click', function () {
        deleteForm.submit();
    });

    // close when clicking outside
    deleteModal.addEventListener('click', function (e) {
        if (e.target === deleteModal) {
            closeDeleteModal();
        }
    });
</script>
