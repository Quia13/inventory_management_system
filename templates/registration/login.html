{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/App-Logo.png' %}">
    <title>Login | Inventory Management System</title>
</head>

<body class="min-h-screen flex flex-col md:flex-row">

    <!-- LEFT SIDE (Branding) -->
    <div class="md:w-1/2 w-full flex flex-col items-center justify-center bg-linear-to-br from-blue-600 to-indigo-700 text-white p-10">

        <img src="{% static 'images/App-Logo.png' %}"
             alt="App Logo"
             class="w-28 h-28 rounded-full shadow-xl mb-6">

        <h1 class="text-3xl md:text-4xl font-bold text-center">
            Inventory Management System
        </h1>

        <p class="mt-4 text-center text-blue-100 max-w-sm">
            Manage your stocks, track inventory, and streamline your business operations efficiently.
        </p>
    </div>

    <!-- RIGHT SIDE (Login Form) -->
    <div class="md:w-1/2 w-full flex items-center justify-center bg-gray-50 dark:bg-gray-900 p-6">

        <div class="w-full max-w-md bg-white dark:bg-gray-800 shadow-2xl rounded-2xl p-8">

            <h2 class="text-2xl font-bold text-center text-gray-900 dark:text-white">
                Welcome Back
            </h2>
            <p class="text-center text-sm text-gray-500 dark:text-gray-400 mb-6">
                Please login to continue
            </p>

            {% if form.errors %}
                <div class="mb-4 text-sm text-red-500 text-center bg-red-50 dark:bg-red-900/20 p-2 rounded-lg">
                    Invalid credentials
                </div>
            {% endif %}

            <form action="{% url 'login:login' %}" method="post" class="space-y-5">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <!-- Username -->
                <div>
                    <label class="block text-sm mb-1 text-gray-700 dark:text-gray-300">
                        Username or Email
                    </label>
                    <input type="text"
                           name="username"
                           placeholder="Enter your Username or Email"
                           id="id_username"
                           required
                           value="{{ form.username.value|default_if_none:'' }}"
                           class="w-full px-4 py-3 rounded-xl border bg-white dark:bg-gray-700
                                  border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white
                                  focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm mb-1 text-gray-700 dark:text-gray-300">
                        Password
                    </label>

                    <div class="relative">
                        <input type="password"
                            name="password"
                            placeholder="Enter your password"
                            id="id_password"
                            required
                            class="w-full px-4 py-3 pr-12 rounded-xl border bg-white dark:bg-gray-700
                                    border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white
                                    focus:ring-2 focus:ring-blue-500 outline-none transition">

                        <button id="togglePassword"
                                type="button"
                                aria-label="Show password"
                                class="absolute right-3 top-1/2 -translate-y-1/2
                                    text-blue-500 hover:text-blue-600
                                    focus:outline-none">

                            <!-- Eye -->
                            <svg id="eyeIcon"
                                xmlns="http://www.w3.org/2000/svg"
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                class="fill-current">
                                <path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5C21.3 7.6 17 4.5 12 4.5zm0 12.5c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/>
                            </svg>

                            <!-- Eye Off -->
                            <svg id="eyeOffIcon"
                                xmlns="http://www.w3.org/2000/svg"
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                class="fill-current"
                                style="display:none;">
                                <path d="M2 4.3l1.3-1.3 18 18L20 22l-3.1-3.1C15.6 19.6 13.9 20 12 20 7 20 2.7 16.9 1 12c.8-2.1 2.1-3.9 3.8-5.2L2 4.3zm10 12.2c-2.8 0-5-2.2-5-5 0-.6.1-1.2.3-1.7l1.5 1.5c0 .1 0 .2 0 .2 0 1.7 1.3 3 3 3 .1 0 .2 0 .2 0l1.5 1.5c-.5.2-1.1.3-1.7.3zm0-10c5 0 9.3 3.1 11 7.5-.7 1.7-1.8 3.2-3.2 4.4l-1.4-1.4c1-.8 1.9-1.9 2.5-3C20 10.7 16.4 8 12 8c-1.1 0-2.2.2-3.2.5L7.3 7C8.7 6.4 10.3 6.5 12 6.5z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Remember -->
                <div class="flex items-center text-sm text-gray-600 dark:text-gray-300">
                    <input type="checkbox" name="remember_me" id="remember_me"
                           class="h-4 w-4 mr-2 text-blue-600">
                    <label for="remember_me">Remember me</label>
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold
                               py-3 rounded-xl shadow-md transition">
                    Log in
                </button>
            </form>
        </div>
    </div>

    <!-- PASSWORD EYE TOGGLE -->
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('id_password');

        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');

        togglePassword.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';

            passwordInput.type = isHidden ? 'text' : 'password';

            eyeIcon.style.display = isHidden ? 'none' : 'block';
            eyeOffIcon.style.display = isHidden ? 'block' : 'none';

            togglePassword.setAttribute(
                'aria-label',
                isHidden ? 'Hide password' : 'Show password'
            );
        });
    </script>
</body>
</html>
